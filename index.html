<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band Timeline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --bg2: #0a0a0c;
    --bg3: #111113;
    --border: #1e1e2e;
    --border2: #2a2a3a;
    --text: #e2e8f0;
    --muted: #4b5563;
    --muted2: #6b7280;
    --font: 'SF Mono', 'Fira Code', Consolas, monospace;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  /* HEADER */
  #header { display: flex; align-items: center; gap: 16px; padding: 10px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #song-title { font-size: 18px; font-weight: 700; cursor: text; outline: none; background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text); font-family: var(--font); letter-spacing: 0.05em; }
  #song-title:focus { border-bottom-color: #818cf8; }
  .spacer { flex: 1; }
  .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  #bpm-input { width: 60px; background: #1a1a2e; border: 1px solid #2d2d4e; color: #818cf8; border-radius: 4px; padding: 3px 6px; font-size: 14px; font-family: var(--font); text-align: center; }
  .btn { background: #1e1e2e; border: 1px solid var(--muted); color: var(--muted); border-radius: 4px; padding: 5px 12px; cursor: pointer; font-family: var(--font); font-size: 13px; }
  .btn:hover { border-color: var(--text); color: var(--text); }
  .btn.green { background: #1a2a1a; border-color: #4ade80; color: #4ade80; }
  .btn.purple { background: #1a1a2e; border-color: #818cf8; color: #818cf8; }

  /* NOW PLAYING */
  #now-playing { display: flex; align-items: center; gap: 24px; padding: 10px 20px; border-bottom: 2px solid #333; transition: background 0.3s, border-color 0.3s; flex-shrink: 0; min-height: 52px; }
  #np-section { font-size: 20px; font-weight: 700; min-width: 120px; transition: color 0.3s; }
  #np-bar { color: var(--muted2); font-size: 13px; }
  #np-bar span { color: var(--text); font-weight: 600; }
  #np-beat { color: var(--muted2); font-size: 13px; }
  #np-beat span { color: var(--text); font-weight: 600; }
  #np-chords { flex: 1; text-align: center; font-size: 15px; font-weight: 600; letter-spacing: 0.15em; transition: color 0.3s; }
  #np-next { font-size: 12px; color: var(--muted); }

  /* TIMELINE */
  #timeline-wrap { position: relative; height: 110px; overflow-x: auto; overflow-y: hidden; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; cursor: crosshair; }
  #timeline-inner { position: relative; height: 100%; }
  .tl-section { position: absolute; top: 16px; height: 72px; border-radius: 3px; padding: 6px 8px; overflow: hidden; pointer-events: none; }
  .tl-section-name { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .tl-section-bars { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .tl-section-chords { font-size: 10px; color: var(--muted2); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .beat-line { position: absolute; top: 0; bottom: 0; width: 1px; pointer-events: none; }
  #playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #f87171; box-shadow: 0 0 8px #f87171; pointer-events: none; z-index: 10; }
  #playhead-dot { width: 8px; height: 8px; background: #f87171; border-radius: 50%; margin-left: -3px; margin-top: 8px; }

  /* EDITOR */
  #editor { flex: 1; overflow-y: auto; padding: 12px 20px; background: var(--bg2); display: none; }
  #editor.visible { display: block; }
  #editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  #sections-list { display: flex; flex-direction: column; gap: 6px; }
  .sec-row { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; }
  .sec-row select, .sec-row input { background: var(--bg); border: 1px solid var(--border2); color: var(--text); border-radius: 3px; padding: 3px 6px; font-size: 12px; font-family: var(--font); }
  .sec-row input[type=number] { width: 46px; }
  .sec-row input.chord-input { flex: 1; }
  .sec-row select.time-sel { width: 58px; }
  .move-btns { display: flex; flex-direction: column; gap: 1px; }
  .move-btns button { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 1px 3px; font-size: 10px; line-height: 1; }
  .move-btns button:hover { color: var(--text); }
  .remove-btn { background: transparent; border: none; color: #f87171; cursor: pointer; padding: 2px 6px; font-size: 12px; }
  .hint { flex: 1; display: flex; align-items: center; justify-content: center; color: #1e1e2e; font-size: 12px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <input id="song-title" value="New Song" />
  <div class="spacer"></div>
  <span class="label">BPM</span>
  <input id="bpm-input" type="number" value="120" min="20" max="400" />
  <button class="btn" id="stop-btn">■ Stop</button>
  <button class="btn green" id="play-btn">▶ Play</button>
  <button class="btn" id="editor-toggle">Edit Sections</button>
</div>

<!-- NOW PLAYING -->
<div id="now-playing">
  <div id="np-section">—</div>
  <div id="np-bar">Bar <span id="np-bar-num">—</span> / <span id="np-bar-total" style="color:var(--muted)">—</span></div>
  <div id="np-beat">Beat <span id="np-beat-num">—</span></div>
  <div id="np-chords"></div>
  <div id="np-next"></div>
</div>

<!-- TIMELINE -->
<div id="timeline-wrap">
  <div id="timeline-inner"></div>
</div>

<!-- EDITOR -->
<div id="editor">
  <div id="editor-header">
    <span class="label">Song Sections</span>
    <button class="btn purple" id="add-section-btn">+ Add Section</button>
  </div>
  <div id="sections-list"></div>
</div>

<div class="hint" id="hint">Click the timeline to seek · Press ▶ to play</div>

<script src="app.js"></script>
</body>
</html>
